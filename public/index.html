<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syria Tunes | الرئيسية</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        header { background-color: #1a1a1a; color: white; padding: 20px; text-align: center; }
        nav { background-color: #333; display: flex; justify-content: center; padding: 10px; }
        nav a { color: white; text-decoration: none; padding: 10px 20px; margin: 0 5px; border-radius: 5px; transition: 0.3s; }
        nav a:hover { background-color: #ff4757; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        h1 { margin-bottom: 15px; color: #1a1a1a; }
        p { font-size: 18px; color: #666; line-height: 1.6; margin-bottom: 30px; }
        .social-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .social-btn { display: inline-block; padding: 12px 25px; color: white; text-decoration: none; border-radius: 25px; font-weight: bold; transition: 0.3s; }
        .youtube { background-color: #ff0000; }
        .tiktok { background-color: #010101; }
        .social-btn:hover { opacity: 0.8; transform: translateY(-3px); }
    </style>
</head>
<body>

    <header>
        <h2>Syria Tunes</h2>
    </header>

    <nav>
        <a href="/">الرئيسية</a>
        <a href="#">معرض الصور</a>
        <a href="#">المتجر الرقمي</a>
        <a href="#">المدونة</a>
    </nav>

    <div class="container">
        <h1>مرحباً بك في Syria Tunes 🎉</h1>
        <p>موقعك المفضل لاستكشاف التصاميم، الكتب الرقمية، والمنشورات اليومية الممتعة. انتظرونا قريباً لتفعيل كافة الأقسام!</p>
        
        <h3>تابعنا على منصات التواصل الاجتماعي:</h3>
        <div class="social-links">
            <a href="#" class="social-btn youtube" target="_blank">يوتيوب YouTube</a>
            <a href="#" class="social-btn tiktok" target="_blank">تيك توك TikTok</a>
        </div>
    </div>

</body>
</html>
