<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syria Tunes | المدونة اليومية</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        header { background-color: #1a1a1a; color: white; padding: 20px; text-align: center; }
        nav { background-color: #333; display: flex; justify-content: center; padding: 10px; }
        nav a { color: white; text-decoration: none; padding: 10px 20px; margin: 0 5px; border-radius: 5px; transition: 0.3s; }
        nav a:hover { background-color: #ff4757; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #1a1a1a; }
        .post-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-right: 5px solid #ff4757; }
        .post-title { color: #1a1a1a; margin-bottom: 10px; font-size: 22px; }
        .post-date { color: #aaa; font-size: 14px; margin-bottom: 15px; }
        .post-content { line-height: 1.7; color: #555; white-space: pre-line; }
        .no-posts { text-align: center; color: #999; font-size: 18px; background: white; padding: 40px; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <h2>Syria Tunes</h2>
    </header>

    <nav>
        <a href="/">الرئيسية</a>
        <a href="/gallery.html">معرض الصور</a>
        <a href="#">المتجر الرقمي</a>
        <a href="/blog.html">المدونة</a>
    </nav>

    <div class="container">
        <h1>📝 المنشورات اليومية</h1>
        
        <div id="blog-posts-container">
            <div class="no-posts">جاري تحميل المقالات...</div>
        </div>
    </div>

    <script>
        // دالة لجلب المقالات من السيرفر وعرضها
        async function fetchPosts() {
            try {
                const response = await fetch('/api/posts');
                const posts = await response.json();
                const container = document.getElementById('blog-posts-container');
                
                if (posts.length === 0) {
                    container.innerHTML = '<div class="no-posts">لا توجد منشورات اليوم. ترقبوا الإضافات الجديدة قريباً! ✨</div>';
                    return;
                }
                
                container.innerHTML = ''; // مسح رسالة التحميل
                posts.forEach(post => {
                    const postCard = document.createElement('div');
                    postCard.className = 'post-card';
                    postCard.innerHTML = `
                        <h2 class="post-title">${post.title}</h2>
                        <div class="post-date">📅 نُشر بتاريخ: ${post.date}</div>
                        <p class="post-content">${post.content}</p>
                    `;
                    container.appendChild(postCard);
                });
            } catch (error) {
                console.error('خطأ في جلب المقالات:', error);
            }
        }

        // تشغيل الدالة بمجرد فتح الصفحة
        fetchPosts();
    </script>
</body>
</html>
