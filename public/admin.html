<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syria Tunes | لوحة التحكم</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; padding: 20px; }
        .dashboard { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; margin-bottom: 30px; color: #1a1a1a; border-bottom: 2px solid #ff4757; padding-bottom: 10px; }
        .section { margin-bottom: 40px; padding: 20px; border: 1px solid #ddd; border-radius: 6px; background-color: #fafafa; }
        h2 { margin-bottom: 15px; color: #333; font-size: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], textarea, input[type="file"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        textarea { height: 120px; resize: vertical; }
        button { background-color: #2ed573; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background-color: #26af5f; }
        .btn-gallery { background-color: #1e90ff; }
        .btn-gallery:hover { background-color: #1e70ff; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>لوحة تحكم Syria Tunes السحرية 🎛️</h1>

        <div class="section">
            <h2>✍️ نشر مقال جديد في المدونة اليومية</h2>
            <form action="/api/posts" method="POST">
                <label for="title">عنوان المقال:</label>
                <input type="text" id="title" name="title" placeholder="اكتب عنواناً جذاباً هنا..." required>

                <label for="content">محتوى المقال:</label>
                <textarea id="content" name="content" placeholder="اكتب تفاصيل المنشور اليومي هنا..." required></textarea>

                <button type="submit">نشر المقال فوراً 🚀</button>
            </form>
        </div>

        <div class="section">
            <h2>📸 إضافة صورة جديدة إلى معرض الصور</h2>
            <form action="/api/gallery" method="POST" enctype="multipart/form-data">
                <label for="image">اختر صورة من جهازك:</label>
                <input type="file" id="image" name="image" accept="image/*" required>

                <button type="submit" class="btn-gallery">رفع الصورة للمعرض 📤</button>
            </form>
        </div>
    </div>

</body>
</html>
